services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=data/mood-tracker.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-2.5-flash-lite
      - ENABLE_GEMINI=true
      - AI_TIMEOUT=10
      - AI_MAX_RETRIES=2
    depends_on:
      migrations:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_SERVER_URL=http://backend:8000
    depends_on:
      - backend

  migrations:
    image: sqitch/sqitch:latest
    volumes:
      - ./migrations:/app
      - ./data:/app/data
    command: init "mood-tracker" --engine sqlite && sqitch plan db:sqlite:/app/data/mood-tracker.db && sqitch deploy db:sqlite:/app/data/mood-tracker.db
    working_dir: /app
